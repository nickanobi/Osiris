<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Osiris — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --accent: #0a84ff;
      --text: #f2f2f7;
      --subtext: #8e8e93;
      --radius: 18px;
      --error: #ff453a;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 1.4em;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 0.85em;
      color: var(--subtext);
      margin-bottom: 16px;
    }
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1em;
      outline: none;
      -webkit-appearance: none;
    }
    input::placeholder {
      color: var(--subtext);
    }
    input:focus {
      box-shadow: 0 0 0 2px var(--accent);
    }
    .error-msg {
      font-size: 0.82em;
      color: var(--error);
      text-align: center;
      padding: 2px 0;
    }
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    button[type="submit"]:active {
      opacity: 0.8;
    }
    .footer {
      font-size: 0.72em;
      color: var(--subtext);
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🤖</div>
    <h1>Osiris</h1>
    <p class="subtitle">Sign in to continue</p>

    <form method="POST" action="/login" autocomplete="on">
      <input
        type="text"
        name="username"
        placeholder="Username"
        autocomplete="username"
        autocapitalize="none"
        autofocus
        required
      />
      <input
        type="password"
        name="password"
        placeholder="Password"
        autocomplete="current-password"
        required
      />
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <button type="submit">Sign in</button>
    </form>

    <p class="footer">Your home assistant · Running locally on Mac Studio</p>
  </div>
</body>
</html>
