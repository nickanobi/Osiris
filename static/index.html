<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Osiris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --surface3: #3a3a3c;
      --accent: #0a84ff;
      --text: #f2f2f7;
      --subtext: #8e8e93;
      --user-bubble: #0a84ff;
      --agent-bubble: #2c2c2e;
      --radius: 18px;
      --warn: #ff9f0a;
      --danger: #ff453a;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Topics drawer overlay ───────────────────────────────────── */
    #topics-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #topics-overlay.visible { display: block; }

    /* ── Topics drawer panel ─────────────────────────────────────── */
    #topics-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 290px;
      max-width: 85vw;
      background: var(--surface);
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      border-right: 1px solid #2c2c2e;
    }
    #topics-drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px 14px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
    }
    .drawer-title {
      font-size: 0.95em;
      font-weight: 600;
      color: var(--text);
    }
    #drawer-close-btn {
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 1.1em;
      padding: 4px 6px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    #drawer-close-btn:hover { color: var(--text); background: var(--surface2); }

    #new-topic-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 24px);
      margin: 12px auto 6px;
      background: #0a84ff14;
      border: 1px solid #0a84ff30;
      border-radius: 12px;
      color: var(--accent);
      font-size: 0.88em;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #new-topic-btn:hover { background: #0a84ff22; }
    #new-topic-btn:disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }
    #new-topic-btn .plus { font-size: 1.1em; line-height: 1; }

    #topics-count-label {
      font-size: 0.7em;
      color: var(--subtext);
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }

    #topics-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .topic-item {
      display: flex;
      align-items: center;
      padding: 11px 12px;
      cursor: pointer;
      border-radius: 12px;
      margin-bottom: 2px;
      gap: 10px;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .topic-item:hover { background: var(--surface2); }
    .topic-item.active { background: #0a84ff18; }
    .topic-item.active::before {
      content: "";
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 3px;
      background: var(--accent);
      border-radius: 3px;
    }

    .topic-item-main {
      flex: 1;
      min-width: 0;
    }
    .topic-item-name {
      font-size: 0.88em;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .topic-item.active .topic-item-name { color: var(--accent); }
    .topic-item-meta {
      font-size: 0.72em;
      color: var(--subtext);
      margin-top: 2px;
    }
    .topic-item-meta.near-limit { color: var(--warn); }
    .topic-item-meta.at-limit   { color: var(--danger); }

    .topic-delete-btn {
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 0.9em;
      padding: 5px 6px;
      border-radius: 7px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .topic-item:hover .topic-delete-btn,
    .topic-item.active .topic-delete-btn { opacity: 0.6; }
    .topic-delete-btn:hover { opacity: 1 !important; background: #ff453a22; color: var(--danger); }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2c2c2e;
      flex-shrink: 0;
    }

    #topics-btn {
      background: none;
      border: none;
      color: var(--subtext);
      cursor: pointer;
      font-size: 1.25em;
      padding: 4px 6px;
      border-radius: 8px;
      flex-shrink: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    #topics-btn:hover { color: var(--text); background: var(--surface2); }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .header-info {
      flex: 1;
      min-width: 0;
    }
    .header-info h1 {
      font-size: 0.9em;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .header-info span {
      font-size: 0.7em;
      color: var(--subtext);
    }
    #current-topic-name {
      color: var(--text);
    }
    #user-display-name {
      color: var(--subtext);
    }

    #signout-btn {
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 0.8em;
      cursor: pointer;
      padding: 6px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #signout-btn:hover { color: var(--text); }
    #claude-usage {
      margin-right: 0px;
      text-align: right;
      line-height: 1.35;
      display: none;
      flex-shrink: 0;
    }
    #usage-label { font-size: 0.7em; color: var(--subtext); white-space: nowrap; }
    #usage-cost  { font-size: 0.68em; color: #5e5ce6; white-space: nowrap; }

    /* ── Voice mode bar ─────────────────────────────────────────── */
    #voice-mode-bar {
      display: none;
      background: #0a84ff0f;
      border-bottom: 1px solid #0a84ff2a;
      padding: 7px 16px;
      font-size: 0.8em;
      color: #0a84ff;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #voice-mode-bar.visible { display: flex; }
    #voice-status-text { display: flex; align-items: center; gap: 6px; }
    #end-voice-btn {
      background: none;
      border: 1px solid #0a84ff44;
      border-radius: 20px;
      color: #0a84ff;
      cursor: pointer;
      font-size: 0.85em;
      padding: 3px 10px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Near-limit warning bar ──────────────────────────────────── */
    #limit-bar {
      display: none;
      padding: 5px 16px;
      font-size: 0.76em;
      text-align: center;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
    }
    #limit-bar.warn {
      display: block;
      color: var(--warn);
      background: #ff9f0a0d;
      border-color: #ff9f0a20;
    }
    #limit-bar.full {
      display: block;
      color: var(--danger);
      background: #ff453a0d;
      border-color: #ff453a20;
    }

    /* ── Chat window ────────────────────────────────────────────── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .bubble-row { display: flex; flex-direction: column; }
    .bubble-row.user  { align-items: flex-end; }
    .bubble-row.agent { align-items: flex-start; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.95em;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-row.user  .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .bubble-row.agent .bubble { background: var(--agent-bubble); border-bottom-left-radius: 4px; }
    .bubble-row.agent .bubble.claude-response { border-left: 2px solid #5e5ce6; }
    .timestamp { font-size: 0.7em; color: var(--subtext); margin-top: 4px; padding: 0 4px; }

    .thinking-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--agent-bubble);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--subtext);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .bubble.streaming::after {
      content: "▍";
      display: inline-block;
      animation: blink 0.8s step-start infinite;
      color: var(--subtext);
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ─────────────────────────────────────────────── */
    #input-area {
      background: var(--surface);
      border-top: 1px solid #2c2c2e;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--surface2);
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 1em;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      -webkit-appearance: none;
    }
    #user-input::placeholder { color: var(--subtext); }
    #user-input:disabled { opacity: 0.5; }

    /* ── Voice mic button ───────────────────────────────────────── */
    #voice-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--surface2);
      color: var(--subtext);
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #voice-btn svg { width: 17px; height: 17px; pointer-events: none; }
    #voice-btn.voice-on  { background: #0a84ff1a; color: #0a84ff; }
    #voice-btn.recording { background: #ff3b301a; color: #ff3b30; animation: mic-pulse 1.2s ease-in-out infinite; }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 #ff3b3033; }
      50%       { box-shadow: 0 0 0 8px transparent; }
    }

    #send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }

    #clear-btn {
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 0.8em;
      cursor: pointer;
      padding: 6px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
      gap: 10px;
      padding-bottom: 60px;
    }
    .empty-state .icon { font-size: 3em; }
    .empty-state p     { font-size: 0.9em; }
  </style>
</head>
<body>

  <!-- Topics overlay (tap to close drawer) -->
  <div id="topics-overlay" onclick="closeTopicsDrawer()"></div>

  <!-- Topics drawer -->
  <div id="topics-drawer">
    <div class="drawer-header">
      <span class="drawer-title">Conversations</span>
      <button id="drawer-close-btn" onclick="closeTopicsDrawer()">✕</button>
    </div>
    <button id="new-topic-btn" onclick="createTopic()">
      <span class="plus">＋</span> New conversation
    </button>
    <div id="topics-count-label"></div>
    <div id="topics-list"></div>
  </div>

  <!-- Main header -->
  <header>
    <button id="topics-btn" onclick="openTopicsDrawer()" title="Conversations">☰</button>
    <div class="avatar" id="user-avatar">🤖</div>
    <div class="header-info">
      <h1 id="current-topic-name">Osiris</h1>
      <span id="user-display-name">● Online</span>
    </div>
    <div id="claude-usage">
      <div id="usage-label"></div>
      <div id="usage-cost"></div>
    </div>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
    <button id="signout-btn" onclick="signOut()">Sign out</button>
  </header>

  <!-- Shown while voice mode is active -->
  <div id="voice-mode-bar">
    <span id="voice-status-text">🎤 Voice mode — tap mic to speak</span>
    <button id="end-voice-btn" onclick="exitVoiceMode()">End voice</button>
  </div>

  <!-- Near-limit warning (shown when topic approaches 40 messages) -->
  <div id="limit-bar"></div>

  <div id="chat-window">
    <div class="empty-state" id="empty-state">
      <div class="icon">🤖</div>
      <p>Osiris is ready. Say something!</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Message Osiris..." rows="1"></textarea>
    <!-- Mic button: tap to enter voice mode / start recording / stop recording -->
    <button id="voice-btn" onclick="handleVoiceBtn()" title="Voice mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const chatWindow = document.getElementById("chat-window");
    const userInput  = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");

    // ── Topic state ──────────────────────────────────────────────────
    let currentTopicId    = null;
    let currentTopicTitle = "Osiris";
    let cachedTopics      = [];

    // Auto-resize textarea
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    });

    // Send on Enter, new line on Shift+Enter
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function removeEmptyState() {
      const el = document.getElementById("empty-state");
      if (el) el.remove();
    }

    function showEmptyState() {
      chatWindow.innerHTML = "";
      const empty = document.createElement("div");
      empty.classList.add("empty-state");
      empty.id = "empty-state";
      empty.innerHTML = '<div class="icon">🤖</div><p>Osiris is ready. Say something!</p>';
      chatWindow.appendChild(empty);
    }

    function addMessage(text, role) {
      removeEmptyState();
      const row    = document.createElement("div");
      row.classList.add("bubble-row", role);
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;
      const time = document.createElement("div");
      time.classList.add("timestamp");
      time.textContent = getTime();
      row.appendChild(bubble);
      row.appendChild(time);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function addStreamingBubble() {
      removeEmptyState();
      const row    = document.createElement("div");
      row.classList.add("bubble-row", "agent");
      row.id = "streaming-row";
      const bubble = document.createElement("div");
      bubble.classList.add("bubble", "streaming");
      bubble.textContent = "";
      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function finalizeStreamingBubble(bubble, isClaudeSource) {
      bubble.classList.remove("streaming");
      if (isClaudeSource) bubble.classList.add("claude-response");
      const row = document.getElementById("streaming-row");
      if (row) {
        row.id = "";
        const time = document.createElement("div");
        time.classList.add("timestamp");
        time.textContent = getTime() + (isClaudeSource ? " · Claude" : "");
        row.appendChild(time);
      }
    }

    function addThinking() {
      const row = document.createElement("div");
      row.classList.add("bubble-row", "agent");
      row.id = "thinking-row";
      const indicator = document.createElement("div");
      indicator.classList.add("thinking-indicator");
      indicator.id = "thinking-indicator";
      indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(indicator);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function setThinkingStatus(text) {
      const indicator = document.getElementById("thinking-indicator");
      if (indicator) {
        indicator.innerHTML = `<span style="font-size:0.85em;color:var(--subtext);padding:0 4px">${text}</span>`;
      }
    }

    function removeThinking() {
      const el = document.getElementById("thinking-row");
      if (el) el.remove();
    }

    function setInputEnabled(enabled) {
      userInput.disabled = !enabled;
      sendBtn.disabled   = !enabled;
    }

    // ── Limit bar ────────────────────────────────────────────────────
    function updateLimitBar(msgCount, isNearLimit, isFull) {
      const bar = document.getElementById("limit-bar");
      if (isFull) {
        bar.textContent = `⚠ Conversation limit reached (${msgCount}/40) — start a new topic to continue.`;
        bar.className = "full";
      } else if (isNearLimit) {
        bar.textContent = `⚠ Nearing conversation limit (${msgCount}/40 messages).`;
        bar.className = "warn";
      } else {
        bar.textContent = "";
        bar.className = "";
      }
    }

    // ── Topics drawer ────────────────────────────────────────────────
    function openTopicsDrawer() {
      loadTopics(); // Always refresh when opening
      document.getElementById("topics-drawer").classList.add("open");
      document.getElementById("topics-overlay").classList.add("visible");
    }

    function closeTopicsDrawer() {
      document.getElementById("topics-drawer").classList.remove("open");
      document.getElementById("topics-overlay").classList.remove("visible");
    }

    function renderTopicMessages(messages) {
      chatWindow.innerHTML = "";
      if (!messages || messages.length === 0) {
        showEmptyState();
        return;
      }
      messages.forEach(msg => {
        const role   = msg.role === "user" ? "user" : "agent";
        const row    = document.createElement("div");
        row.classList.add("bubble-row", role);
        const bubble = document.createElement("div");
        bubble.classList.add("bubble");
        if (role === "agent") bubble.classList.add("claude-response");
        bubble.textContent = msg.content;
        row.appendChild(bubble);
        chatWindow.appendChild(row);
      });
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function loadTopics() {
      try {
        const res  = await fetch("/api/topics");
        const data = await res.json();
        const topics = data.topics; // sorted by last_active desc
        cachedTopics = topics;

        // If no current topic, pick the most recently active
        if (!currentTopicId && topics.length > 0) {
          currentTopicId    = topics[0].id;
          currentTopicTitle = topics[0].title;
          document.getElementById("current-topic-name").textContent = topics[0].title;
        }

        renderTopics(topics, data.max_topics);

        // Update limit bar for current topic
        const cur = topics.find(t => t.id === currentTopicId);
        if (cur) {
          updateLimitBar(cur.message_count, cur.near_limit, cur.is_full);
          // Sync title in case auto-title kicked in
          if (cur.title !== currentTopicTitle) {
            currentTopicTitle = cur.title;
            document.getElementById("current-topic-name").textContent = cur.title;
          }
        }

        return topics;
      } catch (e) {
        console.error("loadTopics error:", e);
        return [];
      }
    }

    function renderTopics(topics, maxTopics) {
      const list      = document.getElementById("topics-list");
      const newBtn    = document.getElementById("new-topic-btn");
      const countLbl  = document.getElementById("topics-count-label");

      list.innerHTML  = "";
      countLbl.textContent = `${topics.length} of ${maxTopics} conversations`;
      newBtn.disabled = topics.length >= maxTopics;

      topics.forEach(topic => {
        const item = document.createElement("div");
        item.className = "topic-item" + (topic.id === currentTopicId ? " active" : "");

        // Left: name + meta
        const main = document.createElement("div");
        main.className = "topic-item-main";

        const name = document.createElement("div");
        name.className = "topic-item-name";
        name.textContent = topic.title;

        const meta = document.createElement("div");
        meta.textContent = `${topic.message_count} / 40 messages`;
        if (topic.is_full) {
          meta.className = "topic-item-meta at-limit";
        } else if (topic.near_limit) {
          meta.className = "topic-item-meta near-limit";
        } else {
          meta.className = "topic-item-meta";
        }

        main.appendChild(name);
        main.appendChild(meta);

        // Right: delete button
        const delBtn = document.createElement("button");
        delBtn.className  = "topic-delete-btn";
        delBtn.textContent = "🗑";
        delBtn.title = "Delete conversation";
        delBtn.onclick = e => { e.stopPropagation(); deleteTopic(topic.id); };

        item.appendChild(main);
        item.appendChild(delBtn);
        item.onclick = () => switchTopic(topic.id, topic.title);
        list.appendChild(item);
      });
    }

    async function switchTopic(id, title) {
      if (id === currentTopicId) { closeTopicsDrawer(); return; }
      currentTopicId    = id;
      currentTopicTitle = title;
      document.getElementById("current-topic-name").textContent = title;
      closeTopicsDrawer();

      // Find messages in cache; re-fetch if needed
      let topic = cachedTopics.find(t => t.id === id);
      if (!topic) {
        const topics = await loadTopics();
        topic = topics.find(t => t.id === id);
      }
      renderTopicMessages(topic ? topic.messages : []);

      // Update limit bar with live counts
      if (topic) {
        updateLimitBar(topic.message_count, topic.near_limit, topic.is_full);
      }
    }

    async function createTopic() {
      const res = await fetch("/api/topics", { method: "POST" });
      if (!res.ok) {
        const data = await res.json();
        // Show as inline message rather than alert
        addMessage(data.error || "Cannot create more conversations — delete one first.", "agent");
        closeTopicsDrawer();
        return;
      }
      const data = await res.json();
      currentTopicId    = data.id;
      currentTopicTitle = data.title;
      document.getElementById("current-topic-name").textContent = data.title;
      closeTopicsDrawer();
      showEmptyState();
      updateLimitBar(0, false, false);
      await loadTopics();
    }

    async function deleteTopic(id) {
      const wasActive = (id === currentTopicId);
      const res = await fetch(`/api/topics/${id}`, { method: "DELETE" });
      if (!res.ok) {
        const data = await res.json();
        addMessage(data.error || "Cannot delete this conversation.", "agent");
        closeTopicsDrawer();
        return;
      }
      // Reload topics and switch if we deleted the active one
      const topics = await loadTopics();
      if (wasActive && topics.length > 0) {
        const next = topics[0];
        currentTopicId    = next.id;
        currentTopicTitle = next.title;
        document.getElementById("current-topic-name").textContent = next.title;
        showEmptyState();
        updateLimitBar(next.message_count, next.near_limit, next.is_full);
        renderTopics(topics, 5);
      }
    }

    // ── Claude usage display ─────────────────────────────────────────
    async function loadUsage() {
      try {
        const res  = await fetch("/api/usage");
        const data = await res.json();
        const usageEl = document.getElementById("claude-usage");
        const labelEl = document.getElementById("usage-label");
        const costEl  = document.getElementById("usage-cost");
        if (data.total_tokens > 0) {
          const tokens = data.total_tokens.toLocaleString();
          const cost   = data.cost_usd < 0.01 ? "<$0.01" : "$" + data.cost_usd.toFixed(2);
          labelEl.textContent = `✨ ${tokens} tokens`;
          costEl.textContent  = `${cost} this month`;
          usageEl.style.display = "block";
        } else {
          usageEl.style.display = "none";
        }
      } catch (e) {}
    }

    async function loadCurrentUser() {
      try {
        const res = await fetch("/api/me");
        if (res.ok) {
          const data = await res.json();
          document.getElementById("user-display-name").textContent = `${data.display_name} · ● Online`;
          document.getElementById("user-avatar").textContent = data.initial;
        }
      } catch (e) {}
    }

    async function signOut() {
      await fetch("/logout", { method: "POST" });
      window.location.href = "/login";
    }

    // ── Voice mode ───────────────────────────────────────────────────
    let voiceMode    = false;
    let isRecording  = false;
    let mediaRecorder = null;
    let audioChunks  = [];

    function handleVoiceBtn() {
      if (!voiceMode) {
        enterVoiceMode();
      } else if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    }

    function enterVoiceMode() {
      voiceMode = true;
      updateVoiceModeUI();
      startRecording();
    }

    function exitVoiceMode() {
      if (isRecording && mediaRecorder) {
        mediaRecorder.onstop = null;
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
        isRecording = false;
      }
      window.speechSynthesis.cancel();
      voiceMode = false;
      updateVoiceModeUI();
    }

    function updateVoiceModeUI() {
      const btn        = document.getElementById("voice-btn");
      const bar        = document.getElementById("voice-mode-bar");
      const statusText = document.getElementById("voice-status-text");

      btn.classList.toggle("voice-on",  voiceMode && !isRecording);
      btn.classList.toggle("recording", isRecording);
      bar.classList.toggle("visible",   voiceMode);

      if (isRecording) {
        statusText.textContent = "🔴 Recording — tap mic to stop";
      } else if (voiceMode) {
        statusText.textContent = "🎤 Voice mode — tap mic to speak";
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks  = [];
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : "audio/webm";
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          await transcribeAndSend();
        };
        mediaRecorder.start();
        isRecording = true;
        updateVoiceModeUI();
      } catch (err) {
        console.error("Mic access error:", err);
        voiceMode   = false;
        isRecording = false;
        updateVoiceModeUI();
        addMessage("Microphone access was denied. Please allow mic access in your browser settings.", "agent");
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        updateVoiceModeUI();
      }
    }

    async function transcribeAndSend() {
      if (audioChunks.length === 0) return;
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      if (blob.size < 1500) {
        updateVoiceModeUI();
        return;
      }

      const formData = new FormData();
      formData.append("audio", blob, "recording.webm");

      addThinking();
      setThinkingStatus("🎤 Transcribing...");
      setInputEnabled(false);

      try {
        const res  = await fetch("/transcribe", { method: "POST", body: formData });
        const data = await res.json();
        removeThinking();

        if (data.text && data.text.trim()) {
          await submitMessage(data.text);
        } else {
          setInputEnabled(true);
          updateVoiceModeUI();
          addMessage("Couldn't make out what you said — tap the mic and try again.", "agent");
        }
      } catch (err) {
        removeThinking();
        setInputEnabled(true);
        updateVoiceModeUI();
        addMessage("Transcription failed. Check the server logs.", "agent");
      }
    }

    function speakResponse(text) {
      if (!voiceMode) return;
      const clean = text
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/#{1,6}\s+/g, "")
        .replace(/```[\s\S]*?```/g, "code block.")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
        .replace(/\n{2,}/g, ". ")
        .replace(/\n/g, " ")
        .trim();

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(clean);
      utterance.rate  = 1.05;
      utterance.pitch = 1.0;
      const voices    = window.speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        v.name.includes("Samantha") ||
        v.name.includes("Google US English") ||
        (v.lang === "en-US" && v.localService)
      );
      if (preferred) utterance.voice = preferred;
      window.speechSynthesis.speak(utterance);
    }

    // ── Core send / submit logic ─────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || sendBtn.disabled) return;
      window.speechSynthesis.cancel();
      userInput.value = "";
      userInput.style.height = "auto";
      await submitMessage(text);
      userInput.focus();
    }

    async function submitMessage(text) {
      addMessage(text, "user");
      setInputEnabled(false);
      addThinking();

      let agentBubble    = null;
      let isClaudeSource = false;
      let fullText       = "";

      try {
        const res = await fetch("/chat", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            message:    text,
            voice_mode: voiceMode,
            topic_id:   currentTopicId
          })
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = JSON.parse(line.slice(6));

            if (payload.status) setThinkingStatus(payload.status);

            if (payload.token !== undefined) {
              if (!agentBubble) {
                removeThinking();
                agentBubble = addStreamingBubble();
              }
              agentBubble.textContent += payload.token;
              fullText += payload.token;
              chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            if (payload.done) {
              isClaudeSource = payload.source === "claude";
              if (agentBubble) finalizeStreamingBubble(agentBubble, isClaudeSource);
              if (isClaudeSource) loadUsage();
              if (voiceMode && fullText) speakResponse(fullText);
              // Refresh topic list: picks up auto-title + updated message count
              loadTopics();
            }
          }
        }
      } catch (err) {
        removeThinking();
        addMessage("Could not reach Osiris. Is the server running?", "agent");
      } finally {
        setInputEnabled(true);
        updateVoiceModeUI();
      }
    }

    // ── Clear current topic ──────────────────────────────────────────
    async function clearChat() {
      window.speechSynthesis.cancel();
      await fetch("/clear", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ topic_id: currentTopicId })
      });
      showEmptyState();
      updateLimitBar(0, false, false);
      loadTopics(); // Refresh counts
    }

    // ── Init ─────────────────────────────────────────────────────────
    loadUsage();
    loadCurrentUser();
    loadTopics();
  </script>
</body>
