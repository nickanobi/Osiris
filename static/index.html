<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Osiris</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

  <!-- Topics overlay (tap to close drawer) -->
  <div id="topics-overlay" onclick="closeTopicsDrawer()"></div>

  <!-- Topics drawer -->
  <div id="topics-drawer">
    <div class="drawer-header">
      <span class="drawer-title">Conversations</span>
      <button id="drawer-close-btn" onclick="closeTopicsDrawer()">✕</button>
    </div>
    <button id="new-topic-btn" onclick="createTopic()">
      <span class="plus">＋</span> New conversation
    </button>
    <div id="topics-count-label"></div>
    <div id="topics-list"></div>
  </div>

  <!-- Main header -->
  <header>
    <button id="topics-btn" onclick="openTopicsDrawer()" title="Conversations">☰</button>
    <div class="avatar" id="user-avatar">🤖</div>
    <div class="header-info">
      <h1 id="current-topic-name">Osiris</h1>
      <span id="user-display-name">● Online</span>
    </div>
    <div id="claude-usage">
      <div id="usage-label"></div>
      <div id="usage-cost"></div>
    </div>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
    <button id="signout-btn" onclick="signOut()">Sign out</button>
  </header>

  <!-- Shown while voice mode is active -->
  <div id="voice-mode-bar">
    <span id="voice-status-text">🎤 Voice mode — tap mic to speak</span>
    <button id="end-voice-btn" onclick="exitVoiceMode()">End voice</button>
  </div>

  <!-- Near-limit warning (shown when topic approaches 40 messages) -->
  <div id="limit-bar"></div>

  <div id="chat-window">
    <div class="empty-state" id="empty-state">
      <div class="icon">🤖</div>
      <p>Osiris is ready. Say something!</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Message Osiris..." rows="1"></textarea>
    <!-- Mic button: tap to enter voice mode / start recording / stop recording -->
    <button id="voice-btn" onclick="handleVoiceBtn()" title="Voice mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 11a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8"  y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script src="/static/js/ui.js"></script>
  <script src="/static/js/topics.js"></script>
  <script src="/static/js/user.js"></script>
  <script src="/static/js/voice.js"></script>
  <script src="/static/js/chat.js"></script>
</body>
</html>
